<!DOCTYPE html>
<html lang="fa">
<head>
    <meta charset="UTF-8">
    <title>صفحه دانشجو</title>
    <link rel="stylesheet" href="student_information.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="firebase.js"></script>
</head>
<body dir="rtl">
    <div class="box_container">
        <div id="back_ground">
            <div class="top-header">
                <div class="university-info">
                    <img src="daneshgah_elmi_karbordi3.png" class="university-logo">
                    <p class="university-name">دانشگاه جامع علمی کاربردی</p>
                </div>
                <div class="student-header">
                    <div class="student-info">
                        <h1 id="student-title"></h1>
                        <p id="student-major">رشته: کامپیوتر</p>
                        <p id="student-major">درس: برنامه سازی تحت وب</p>
                        <p id="student-major">استاد : فاطمه کاظمی</p>
                    </div>
                    <div class="image-section">
                        <img id="studentImage"src="default.png"class="student-profile-image">
                        <input type="file"id="imageInput"accept="image/*">
                    </div>
                </div>
            </div>
            <div class="box_table_Weekly_schedule"><h1>برنامه هفتگی</h1>
                <div class="form-container">

                    <select id="day">
                        <option>شنبه</option>
                        <option>یکشنبه</option>
                        <option>دوشنبه</option>
                        <option>سه شنبه</option>
                        <option>چهارشنبه</option>
                        <option>پنجشنبه</option>
                        <option>جمعه</option>
                    </select>

                    <input type="text" id="time" placeholder="ساعت">

                    <input type="text" id="lesson" placeholder="نام درس">

                    <input type="text" id="teacher" placeholder="نام استاد">

                    <button id="addLesson">افزودن</button>

                </div>
                <table id="scheduleTable">
                    <tr>
                        <th>روز</th>
                        <th>ساعت</th>
                        <th>درس</th>
                        <th>نام استاد</th>
                        <th>حذف</th>
                    </tr>
                </table>
            </div>
            
            <div class="box_table_Exam_schedule"><h1>امتحانات</h1>
                <div class="exam-form">

                    <input type="text" id="examLesson" placeholder="نام درس">

                    <input type="text" id="examDate" placeholder="تاریخ">

                    <input type="text" id="examTime" placeholder="ساعت">

                    <input type="text" id="examteacher" placeholder="نام استاد">

                    <button id="addExam">افزودن امتحان</button>

                </div>

                <table id="examTable">

                    <tr>
                        <th>درس</th>
                        <th>تاریخ</th>
                        <th>ساعت</th>
                        <th>نام استاد</th>
                        <th>حذف</th>
                    </tr>

                </table>
            </div>
        </div>
    </div>

<script>
const studentId = localStorage.getItem("selectedStudent");

let currentStudent = null;


const table = document.getElementById("scheduleTable");
const examTable = document.getElementById("examTable");

const addLessonBtn = document.getElementById("addLesson");
const addExamBtn = document.getElementById("addExam");

const imageInput = document.getElementById("imageInput");
const studentImage = document.getElementById("studentImage");


db.collection("students").doc(studentId).get().then((doc) => {
    currentStudent = doc.data();

    document.getElementById("student-title").innerText =
        "دانشجو: " + currentStudent.name;

    studentImage.src = currentStudent.image || "default.png";

    loadSchedule();
    loadExams();
});



function loadSchedule() {
    table.innerHTML = `
        <tr>
            <th>روز</th>
            <th>ساعت</th>
            <th>درس</th>
            <th>استاد</th>
            <th>حذف</th>
        </tr>
    `;

    currentStudent.schedule.forEach((item, index) => {
        const row = document.createElement("tr");

        row.innerHTML = `
            <td>${item.day}</td>
            <td>${item.time}</td>
            <td>${item.lesson}</td>
            <td>${item.teacher}</td>
            <td><button class="deleteLesson">✖</button></td>
        `;

        row.querySelector(".deleteLesson").addEventListener("click", function () {
            currentStudent.schedule.splice(index, 1);

            db.collection("students").doc(studentId).update({
                schedule: currentStudent.schedule
            });

            row.remove();
        });

        table.appendChild(row);
    });
}



function loadExams() {
    examTable.innerHTML = `
        <tr>
            <th>درس</th>
            <th>تاریخ</th>
            <th>ساعت</th>
            <th>استاد</th>
            <th>حذف</th>
        </tr>
    `;

    currentStudent.exams.forEach((item, index) => {
        const row = document.createElement("tr");

        row.innerHTML = `
            <td>${item.lesson}</td>
            <td>${item.date}</td>
            <td>${item.time}</td>
            <td>${item.teacher}</td>
            <td><button class="deleteExam">✖</button></td>
        `;

        row.querySelector(".deleteExam").addEventListener("click", function () {
            currentStudent.exams.splice(index, 1);

            db.collection("students").doc(studentId).update({
                exams: currentStudent.exams
            });

            row.remove();
        });

        examTable.appendChild(row);
    });
}



addLessonBtn.addEventListener("click", function () {
    const day = document.getElementById("day").value;
    const time = document.getElementById("time").value;
    const lesson = document.getElementById("lesson").value;
    const teacher = document.getElementById("teacher").value;

    if (!time || !lesson) {
        alert("ساعت و درس را وارد کنید");
        return;
    }

    currentStudent.schedule.push({
        day,
        time,
        lesson,
        teacher
    });

    db.collection("students").doc(studentId).update({
        schedule: currentStudent.schedule
    }).then(() => {
        loadSchedule();
    });
});



addExamBtn.addEventListener("click", function () {
    const lesson = document.getElementById("examLesson").value;
    const date = document.getElementById("examDate").value;
    const time = document.getElementById("examTime").value;
    const teacher = document.getElementById("examteacher").value;

    if (!lesson || !date || !time || !teacher) {
        alert("همه فیلدها را پر کنید");
        return;
    }

    currentStudent.exams.push({
        lesson,
        date,
        time,
        teacher
    });

    db.collection("students").doc(studentId).update({
        exams: currentStudent.exams
    }).then(() => {
        loadExams();
    });
});



imageInput.addEventListener("change", function () {
    const file = imageInput.files[0];
    if (!file) return;

    const reader = new FileReader();

    reader.onload = function () {
        studentImage.src = reader.result;

        currentStudent.image = reader.result;

        db.collection("students").doc(studentId).update({
            image: currentStudent.image
        });
    };

    reader.readAsDataURL(file);
});
</script>

</body>
</html>
